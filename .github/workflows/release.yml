# release.yml — builds a signed, notarized, stapled .dmg and publishes it as a
# GitHub Release whenever a version tag (v1.2.3) is pushed.
#
# This is what scripts/build-notarize.sh does locally, adapted to run
# unattended in Actions: it needs your Developer ID certificate and an App
# Store Connect API key available as repo secrets, since there is no
# interactive keychain/Apple ID here.
#
# One-time setup — add these under Settings → Secrets and variables → Actions:
#
#   APPLE_CERTIFICATE_P12_BASE64
#     Export your "Developer ID Application" certificate (with its private
#     key) from Keychain Access as a .p12, then:
#       base64 -i DeveloperIDApplication.p12 | pbcopy
#
#   APPLE_CERTIFICATE_PASSWORD
#     The password you set when exporting that .p12.
#
#   APPLE_API_KEY_ID / APPLE_API_ISSUER_ID / APPLE_API_KEY_P8_BASE64
#     From appstoreconnect.apple.com → Users and Access → Integrations → Keys:
#     create a key with the "Developer" role, note its Key ID and Issuer ID,
#     download the .p8 once (Apple won't let you re-download it), then:
#       base64 -i AuthKey_XXXXXXXXXX.p8 | pbcopy
#
# The Developer ID Team ID (C34D3V8484) is already public (it's in
# Shared/HelperProtocol.swift and shown by Gatekeeper on every launch), so it
# isn't treated as a secret here.
#
# Trigger a release with:  git tag v1.0.0 && git push origin v1.0.0

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build, sign, notarize, publish
    # macos-14's bundled Xcode (15.x) can't open the project format the
    # installed xcodegen/XcodeProj writes (format 77): "future Xcode project
    # file format". Needs an Xcode new enough to read it.
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tooling
        run: brew install xcodegen wimlib

      - name: Xcode version
        run: xcodebuild -version

      - name: Import signing certificate into a temporary keychain
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/developer_id.p12"

          echo "$CERT_P12_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Intentionally unquoted: security expects each existing keychain as a
          # separate argument, not one space-joined string.
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Resolve signing identity from the imported certificate
        run: |
          set -euo pipefail
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep 'Developer ID Application' | head -1 | sed -E 's/.*"(.*)"/\1/' || true)"
          if [ -z "$IDENTITY" ]; then
            echo "✖ No 'Developer ID Application' identity found in the imported certificate." >&2
            exit 1
          fi
          echo "▸ Signing identity: $IDENTITY"
          echo "IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Package signed wimlib
        run: scripts/package-wimlib.sh /opt/homebrew "$IDENTITY"

      - name: Generate project
        run: xcodegen generate

      - name: Build signed Release
        run: |
          rm -rf build/dd
          xcodebuild -project Flint.xcodeproj -scheme Flint -configuration Release \
            -derivedDataPath build/dd \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$IDENTITY" \
            DEVELOPMENT_TEAM=C34D3V8484 \
            ENABLE_HARDENED_RUNTIME=YES \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            clean build

      - name: Re-sign helper and app, verify
        run: |
          set -euo pipefail
          APP="build/dd/Build/Products/Release/Flint.app"
          codesign --force --options runtime --timestamp \
            --identifier com.omarhernandez.flint.helper \
            --entitlements Helper/Helper.entitlements --sign "$IDENTITY" \
            "$APP/Contents/MacOS/FlintHelper"
          codesign --force --options runtime --timestamp \
            --entitlements App/App.entitlements --sign "$IDENTITY" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          echo "APP_PATH=$APP" >> "$GITHUB_ENV"

      - name: Create .dmg
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          DMG="build/Flint-$VERSION.dmg"
          STAGE="$RUNNER_TEMP/dmg-stage"
          mkdir -p "$STAGE"
          cp -R "$APP_PATH" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "Flint" -srcfolder "$STAGE" -ov -format UDZO "$DMG"
          codesign --force --sign "$IDENTITY" "$DMG"
          echo "DMG_PATH=$DMG" >> "$GITHUB_ENV"

      - name: Notarize and staple the .dmg
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey_$API_KEY_ID.p8"
          echo "$API_KEY_P8_BASE64" | base64 --decode -o "$KEY_PATH"

          xcrun notarytool submit "$DMG_PATH" \
            --key "$KEY_PATH" --key-id "$API_KEY_ID" --issuer "$API_ISSUER_ID" \
            --wait

          xcrun stapler staple "$DMG_PATH"

          # `spctl -a --type open` (tried here in two earlier iterations, with and
          # without a synthetic quarantine xattr) simulates how Launch Services
          # would open a downloaded file, which needs a real WindowServer/user
          # session — a headless Actions runner doesn't have one, so it reports
          # "rejected: source=Insufficient Context" regardless of whether the file
          # is actually fine. `stapler validate` checks the same ticket that
          # `staple` just attached, without depending on that session.
          xcrun stapler validate "$DMG_PATH"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" "$DMG_PATH" \
            --title "Flint $GITHUB_REF_NAME" \
            --generate-notes
