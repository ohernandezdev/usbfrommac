name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    name: Build & test
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tooling
        run: brew install xcodegen wimlib

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run tests
        run: |
          xcodebuild test \
            -scheme WinUSBMac \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
