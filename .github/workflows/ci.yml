name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    name: Build & test
    # macos-14's bundled Xcode (15.x) can't open the project format the
    # installed xcodegen/XcodeProj writes (format 77): "future Xcode project
    # file format". Needs an Xcode new enough to read it.
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tooling
        run: brew install xcodegen wimlib

      - name: Xcode version
        run: xcodebuild -version

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run tests
        run: |
          xcodebuild test \
            -scheme Flint \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
