# XcodeGen project definition for Flint.
# Generate the Xcode project with:  xcodegen generate
#
# Three targets:
#   - Flint        : SwiftUI app (NOT sandboxed, hardened runtime for distribution)
#   - FlintHelper  : privileged daemon (root) — ONLY eraseDisk via XPC (SMAppService)
#   - FlintTests   : unit tests (disk-filter safety + split-size logic)
#
# MANUAL CONFIG (you): set DEVELOPMENT_TEAM below to your Apple Team ID for
# distribution signing. For local build/test, ad-hoc signing ("-") is used.

name: Flint

options:
  bundleIdPrefix: com.omarhernandez.flint
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en

# Supported languages (String Catalog in App/Resources/Localizable.xcstrings).
knownRegions:
  - en
  - es

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    PRODUCT_NAME: "$(TARGET_NAME)"
    # Local build/test: ad-hoc signing so it works without a Developer ID.
    # Distribution (Phase 8): switch CODE_SIGN_IDENTITY to "Developer ID Application",
    # set DEVELOPMENT_TEAM, and enable ENABLE_HARDENED_RUNTIME.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""            # <-- fill in your Apple Team ID for distribution

targets:

  Flint:
    type: application
    platform: macOS
    sources:
      - path: App
        excludes:
          - "Resources/**"
      # wimlib-imagex (Mach-O with no extension) + its dylibs go to Contents/Resources
      # as an explicit resources phase (XcodeGen doesn't classify them on its own).
      - path: App/Resources
        buildPhase: resources
        optional: true
      - path: Shared
      # The daemon's launchd plist is embedded in Contents/Library/LaunchDaemons
      # (what SMAppService.daemon(plistName:) expects).
      - path: Helper/com.omarhernandez.flint.helper.plist
        buildPhase:
          copyFiles:
            destination: wrapper
            subpath: Contents/Library/LaunchDaemons
    dependencies:
      # The helper executable is copied (and signed) into Contents/MacOS.
      - target: FlintHelper
        embed: true
        copy:
          destination: executables
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.omarhernandez.flint
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/App.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: NO   # Phase 8: YES for notarized distribution
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"

  FlintHelper:
    type: tool
    platform: macOS
    sources:
      - path: Helper
        excludes:
          - "com.omarhernandez.flint.helper.plist"   # embedded from the app target
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.omarhernandez.flint.helper
        CODE_SIGN_ENTITLEMENTS: Helper/Helper.entitlements
        # SMAppService daemon embedding (copy executable to Contents/MacOS and the
        # launchd plist to Contents/Library/LaunchDaemons) is wired in Phase 2,
        # where your real Developer ID signing is also required.

  FlintTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Flint
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Flint.app/Contents/MacOS/Flint"

schemes:
  Flint:
    build:
      targets:
        Flint: all
        FlintHelper: all
        FlintTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FlintTests
