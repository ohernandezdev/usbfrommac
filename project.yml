# XcodeGen project definition for WinUSB Mac.
# Generate the Xcode project with:  xcodegen generate
#
# Three targets:
#   - WinUSBMac        : SwiftUI app (NOT sandboxed, hardened runtime for distribution)
#   - WinUSBMacHelper  : privileged daemon (root) — ONLY eraseDisk via XPC (SMAppService)
#   - WinUSBMacTests   : unit tests (disk-filter safety + split-size logic)
#
# MANUAL CONFIG (you): set DEVELOPMENT_TEAM below to your Apple Team ID for
# distribution signing. For local build/test, ad-hoc signing ("-") is used.

name: WinUSBMac

options:
  bundleIdPrefix: com.omar.winusbmac
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en

# Idiomas soportados (String Catalog en App/Resources/Localizable.xcstrings).
knownRegions:
  - en
  - es

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    PRODUCT_NAME: "$(TARGET_NAME)"
    # Local build/test: ad-hoc signing so it works without a Developer ID.
    # Distribution (Phase 8): switch CODE_SIGN_IDENTITY to "Developer ID Application",
    # set DEVELOPMENT_TEAM, and enable ENABLE_HARDENED_RUNTIME.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""            # <-- rellena tu Apple Team ID para distribución

targets:

  WinUSBMac:
    type: application
    platform: macOS
    sources:
      - path: App
        excludes:
          - "Resources/**"
      # wimlib-imagex (Mach-O sin extensión) + sus dylibs van a Contents/Resources
      # como fase de recursos explícita (XcodeGen no los clasifica solo).
      - path: App/Resources
        buildPhase: resources
        optional: true
      - path: Shared
      # El launchd plist del daemon se embebe en Contents/Library/LaunchDaemons
      # (lo que espera SMAppService.daemon(plistName:)).
      - path: Helper/com.omar.winusbmac.helper.plist
        buildPhase:
          copyFiles:
            destination: wrapper
            subpath: Contents/Library/LaunchDaemons
    dependencies:
      # El ejecutable del helper se copia (y firma) en Contents/MacOS.
      - target: WinUSBMacHelper
        embed: true
        copy:
          destination: executables
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.omar.winusbmac
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/App.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: NO   # Phase 8: YES for notarized distribution
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"

  WinUSBMacHelper:
    type: tool
    platform: macOS
    sources:
      - path: Helper
        excludes:
          - "com.omar.winusbmac.helper.plist"   # se embebe desde el target app
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.omar.winusbmac.helper
        CODE_SIGN_ENTITLEMENTS: Helper/Helper.entitlements
        # SMAppService daemon embedding (copy executable to Contents/MacOS and the
        # launchd plist to Contents/Library/LaunchDaemons) is wired in Phase 2,
        # where your real Developer ID signing is also required.

  WinUSBMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: WinUSBMac
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/WinUSBMac.app/Contents/MacOS/WinUSBMac"

schemes:
  WinUSBMac:
    build:
      targets:
        WinUSBMac: all
        WinUSBMacHelper: all
        WinUSBMacTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WinUSBMacTests
